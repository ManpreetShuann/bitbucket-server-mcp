name: Bug Report
description: Report a bug in Bitbucket Server MCP
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behaviour.
      placeholder: |
        1. Configure MCP with '...'
        2. Call tool '...' with arguments '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened. Include error messages if applicable.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of: pip show bitbucket-server-mcp | grep Version"
      placeholder: "1.3.1"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      description: "Output of: python --version"
      placeholder: "3.12.0"
    validations:
      required: true
  - type: input
    id: mcp-host
    attributes:
      label: MCP host
      description: Which MCP client are you using?
      placeholder: "Claude Code, GitHub Copilot, etc."
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, logs, or screenshots.
    validations:
      required: false
